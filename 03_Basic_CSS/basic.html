<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector in css </title>
    <style>
        div{
            width: 150px;
            height: 150px;
            border: 4px solid black;

        }
        #c{background-color: yellow;
            text-align: center;
        }
        .a{background-color: red;
            text-align: center;
            justify-content: center;
        }
        .b{
            background-color: blue;
            text-align: center;
        }

    </style>
</head>
<body>
    <h1></h1>
    <div class="a"> hwllo world </div>
    <div class="b">hwllo world for india</div>
    <div id="c">hwllo useers</div>
</body>
</html>
