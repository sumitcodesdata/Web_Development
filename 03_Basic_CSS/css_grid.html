<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container{
      display: grid;
      grid-template-columns: 1fr 2fr 3fr;
      height: 70vh;
      background-color: aqua;
    }

    div{
      background-color: orange;
      border: 1px solid black;
    }
  </style>

</head>
<body>
  <nav class="container">
  <div>1</div>
  <div>2</div>
  <div>3</div>
  <div>4</div>
  <div>5</div>
  </nav>
</body>
</html>
