<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .container{
      display: grid;
      height: 99vh;
      grid-template-columns: repeat(4,1fr);
      grid-template-rows: repeat(3,1fr);
      grid-template-areas: 
         "red red black blue"
         "pink green green blue"
         "pink yellow yellow yellow";
      gap:0;
      text-align: center;


    }
    .red{
      grid-area: red;
      background-color: red;
      /* grid-column: 1/3;
      grid-row: 1/2; */
      
    }
    .black{
      grid-area: black;
      background-color:black;
    }
    .pink{
      grid-area: pink;
      background-color: pink;
    }
    .green{
      grid-area:green;
      background-color:green;
    }
    .blue{
      grid-area:blue;
      background-color: blue;
    }
    .yellow{
      grid-area: yellow;
      background-color: yellow;
    }
  

  </style>
</head>
<body>
<div class="container">
    <div class="red">red</div>
    <div class="black">black</div>
    <div class="pink">pink</div>
    <div class="green">green</div>
    <div class="blue">blue</div>
    <div class="yellow">yellow</div>
  </div>
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="currentColor" d="M20.6 17.51a.5.5 0 0 1 0 .98l-.1.01h-17a.5.5 0 0 1 0-1h17zm0-6a.5.5 0 0 1 0 .98l-.1.01h-17a.5.5 0 0 1 0-1h17zm0-6a.5.5 0 0 1 0 .98l-.1.01h-17a.5.5 0 0 1 0-1h17z"></path></svg>
</body>     
</html>
