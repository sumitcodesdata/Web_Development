<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav{
            width: 90vw;
            height: 40px;
            background-color: red;
            border-radius: 13px;
            position: sticky;
            top: 0px;
            margin-left: 70px;
            text-align: center;
            font-size: 35px;

        }
        .firstdiv{
            width: 90vw;
            height: 80vh;
            background-color: antiquewhite;
            margin-left: 70px;
            margin-right: 40px;
            margin-top: 20px;
            position: relative;
        }
        
        .a{
            background-color:aquamarine;
            height: 7vh;
            width: 100px;
            position: absolute;
            left: 20px;
            top: 20px;
            font-size: 30px;
        }
        .b{
            background-color: aquamarine;
            height: 7vh;
            width: 100px;
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
          }
        .c{
            background-color: aquamarine;
            height: 7vh;
            width: 100px;
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 20px;
        }
        .d{
            background-color: aquamarine;
            height: 7vh;
            width: 100px;
            position: absolute;
            left: 20px;
            bottom: 20px;
            font-size: 20px;
        }
        .e{
            background-color: aquamarine;
            height: 7vh;
            width: 100px;
            position: absolute;
            left: 45%;
            bottom: 45%;
            font-size: 30px;
        }
        button{
            transition: .5s;
        }
        button:hover{
            background-color: red;
            border: 4px;
            cursor: pointer;
            transform:scale(1.8);
        }
    </style>
</head>
<body>
    <nav> About myself </nav>
    <div class="firstdiv">
            <button class="a">Home</button>
            <button class="b">About</button>
            <button class="c">Contact</button>
            <button class="d">Services</button>
            <button class="e">Help</button>
    </div>
</body>
</html>
