<!DOCTYPE html>
<html>
<head>
    <title>Interactive Cards</title>
    <style>
        .card {
            width: 250px;
            padding: 20px;
            margin: 10px;
            border: 2px solid black;
            border-radius: 15px; /* Round Corners */
            display: inline-block;
            text-align: center;
            transition: 0.3s;
            background-color: red;
        }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 50px;
            box-shadow: 10px 10px 10px black;
        }

        .card:hover {
            background-color: lightblue;
            border: 5px solid rgb(55, 255, 0);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://cdn.britannica.com/48/252748-050-C514EFDB/Virat-Kohli-India-celebrates-50th-century-Cricket-November-15-2023.jpg" alt="Card Image">
        <h3>Card 1</h3>
        <p>Virat </p>
    </div>

    <div class="card">
        <img src="https://wallpapercave.com/wp/wp3978060.jpg" alt="Card Image">
        <h3>Card 2</h3>
        <p>king </p>
    </div>

    <div class="card">
        <img src="https://staticg.sportskeeda.com/editor/2023/03/eb701-16795904167032-1920.jpg" alt="Card Image">
        <h3>Card 3</h3>
        <p>cheeku</p>
    </div>

</body>
</html>
